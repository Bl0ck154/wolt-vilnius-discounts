name: Check Wolt discounts

on:
  workflow_dispatch:
  repository_dispatch:
    types: [wolt-discount-check]
  schedule:
    # GitHub cron is UTC. GitHub scheduled workflows can be delayed;
    # exact runs should be triggered externally via repository_dispatch.
    # These are 12:30 and 17:30 for Kyiv/Vilnius summer time.
    - cron: "30 9,14 * * *"

permissions:
  contents: write

concurrency:
  group: wolt-discount-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: [self-hosted, Linux, X64, wolt]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check discounts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_DISCOUNT_EUR: ${{ vars.MIN_DISCOUNT_EUR }}
          MIN_DISCOUNT_PERCENT: ${{ vars.MIN_DISCOUNT_PERCENT }}
          INCLUDE_ZERO_DELIVERY: ${{ vars.INCLUDE_ZERO_DELIVERY }}
        run: node src/check-discounts.mjs

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Wolt discount data"
          file_pattern: "docs/data/*.json"
