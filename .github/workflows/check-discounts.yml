name: Update Wolt discount monitor

on:
  workflow_dispatch:
    inputs:
      cities:
        description: "Comma-separated Wolt city ids, for example ltu/vilnius,deu/berlin"
        required: false
        default: "ltu/vilnius"
      all_cities:
        description: "Check every city from the Wolt catalog (large run)"
        required: false
        default: false
        type: boolean
  schedule:
    # GitHub cron is UTC and can be delayed. Scheduled runs are intentionally
    # guarded by Vilnius local-time windows because Telegram notifications are
    # enabled only for the default Vilnius monitor.
    - cron: "30,35,40,45,50,55 9,10,14,15 * * *"
    - cron: "0,5 10,11,15,16 * * *"

permissions:
  contents: write

concurrency:
  group: wolt-discount-monitor-update
  cancel-in-progress: false

jobs:
  check:
    runs-on: [self-hosted, Linux, X64, wolt]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check default notification window
        id: schedule-window
        if: ${{ github.event_name == 'schedule' }}
        shell: bash
        run: |
          hour=$(TZ=Europe/Vilnius date +%H)
          minute=$(TZ=Europe/Vilnius date +%M)
          now_minutes=$((10#$hour * 60 + 10#$minute))

          # Allow 12:30-13:05 and 17:30-18:05 Europe/Vilnius for notifications.
          if { [ "$now_minutes" -ge 750 ] && [ "$now_minutes" -le 785 ]; } || \
             { [ "$now_minutes" -ge 1050 ] && [ "$now_minutes" -le 1085 ]; }; then
            echo "run_check=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled run is inside the default notification window: ${hour}:${minute} Europe/Vilnius"
          else
            echo "run_check=false" >> "$GITHUB_OUTPUT"
            echo "Skipping delayed scheduled run outside default notification windows: ${hour}:${minute} Europe/Vilnius"
          fi

      - name: Update discount data
        if: ${{ github.event_name != 'schedule' || steps.schedule-window.outputs.run_check == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_DISCOUNT_EUR: ${{ vars.MIN_DISCOUNT_EUR }}
          MIN_DISCOUNT_PERCENT: ${{ vars.MIN_DISCOUNT_PERCENT }}
          INCLUDE_ZERO_DELIVERY: ${{ vars.INCLUDE_ZERO_DELIVERY }}
          WOLT_CACHE_TTL_HOURS: ${{ vars.WOLT_CACHE_TTL_HOURS }}
          WOLT_REFRESH_CITY_CATALOG: "true"
          WOLT_CITIES: ${{ github.event.inputs.cities }}
          WOLT_ALL_CITIES: ${{ github.event.inputs.all_cities }}
        run: node src/check-discounts.mjs

      - name: Commit updated data
        if: ${{ github.event_name != 'schedule' || steps.schedule-window.outputs.run_check == 'true' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Wolt discount monitor data"
          file_pattern: "docs/data/*.json docs/data/cities/**/*.json"
