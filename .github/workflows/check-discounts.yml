name: Update Wolt discount monitor

on:
  workflow_dispatch:
    inputs:
      cities:
        description: "Comma-separated Wolt city ids, for example ltu/vilnius,deu/berlin"
        required: false
        default: "ltu/vilnius"
      all_cities:
        description: "Check every city from the Wolt catalog (large run)"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [wolt-discount-monitor]

permissions:
  contents: write

concurrency:
  group: wolt-discount-monitor-update
  cancel-in-progress: false

jobs:
  check:
    runs-on: [self-hosted, Windows, X64, wolt-residential]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update discount data
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_DISCOUNT_EUR: ${{ vars.MIN_DISCOUNT_EUR }}
          MIN_DISCOUNT_PERCENT: ${{ vars.MIN_DISCOUNT_PERCENT }}
          MAX_MINIMUM_SPEND_EUR: ${{ vars.MAX_MINIMUM_SPEND_EUR }}
          INCLUDE_ZERO_DELIVERY: ${{ vars.INCLUDE_ZERO_DELIVERY }}
          WOLT_CACHE_TTL_HOURS: ${{ vars.WOLT_CACHE_TTL_HOURS }}
          WOLT_REFRESH_CITY_CATALOG: "true"
          WOLT_CITIES: ${{ github.event.inputs.cities || github.event.client_payload.cities || 'ltu/vilnius' }}
          WOLT_ALL_CITIES: ${{ github.event.inputs.all_cities || github.event.client_payload.all_cities || 'false' }}
        run: node src/check-discounts.mjs

      - name: Commit updated data
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- docs/data
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update Wolt discount monitor data"
            git push
          } else {
            Write-Host "No data changes to commit."
          }
