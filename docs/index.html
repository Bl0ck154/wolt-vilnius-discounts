<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wolt Vilnius Discounts</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Vilnius, Lithuania</p>
        <h1>Wolt discount monitor</h1>
      </div>
      <a class="source-link" href="data/latest.json">latest.json</a>
    </header>

    <main>
      <section class="stats" aria-label="Summary">
        <div>
          <span class="metric" id="promoCount">-</span>
          <span class="label">promo venues</span>
        </div>
        <div>
          <span class="metric" id="restaurantCount">-</span>
          <span class="label">restaurants total</span>
        </div>
        <div>
          <span class="metric" id="updatedAt">-</span>
          <span class="label">last update</span>
        </div>
      </section>

      <section class="controls" aria-label="Table controls">
        <div class="controls-row">
          <label class="search">
            <span>Search</span>
            <input id="searchInput" type="search" placeholder="Venue, offer, slug, address..." />
          </label>

          <label>
            <span>Type</span>
            <select id="productFilter"></select>
          </label>

          <label>
            <span>Sort</span>
            <select id="sortSelect">
              <option value="best-desc">Best discount</option>
              <option value="best-asc">Worst discount</option>
              <option value="name-asc">Name A-Z</option>
              <option value="name-desc">Name Z-A</option>
              <option value="type-asc">Type</option>
              <option value="type-desc">Type desc</option>
              <option value="hours-asc">Open first</option>
              <option value="hours-desc">Closed first</option>
            </select>
          </label>
        </div>

        <div class="toggle-row" aria-label="Offer visibility">
          <label class="toggle">
            <input id="hideNewUserDelivery" type="checkbox" checked />
            <span>Hide “0€ delivery for new users”</span>
          </label>
          <label class="toggle">
            <input id="hideDeliveryDiscounts" type="checkbox" checked />
            <span>Hide delivery discounts</span>
          </label>
          <span class="shown-count" id="shownCount">-</span>
        </div>
      </section>

      <section class="table-wrap" aria-label="Venues">
        <table>
          <thead>
            <tr>
              <th class="num-col"><button class="sort-header" data-sort-key="rank">#</button></th>
              <th><button class="sort-header" data-sort-key="name">Venue</button></th>
              <th><button class="sort-header" data-sort-key="type">Type</button></th>
              <th>Offer</th>
              <th><button class="sort-header" data-sort-key="best">Best</button></th>
              <th><button class="sort-header" data-sort-key="hours">Hours</button></th>
              <th>Map</th>
            </tr>
          </thead>
          <tbody id="venueRows">
            <tr>
              <td colspan="7" class="empty">Loading...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
